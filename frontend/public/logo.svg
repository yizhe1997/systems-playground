<svg viewBox="0 0 315 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" /> <!-- Tailwind Cyan 500 (Primary) -->
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#10b981" /> <!-- Tailwind Emerald 500 -->
    </linearGradient>
  </defs>
  <style>
    .t-main { fill: #0f172a; }
    .t-accent { fill: url(#brandGrad); }
    .s-accent { stroke: url(#brandGrad); }
    @media (prefers-color-scheme: dark) {
      .t-main { fill: #f8fafc; }
    }
  </style>
  <text x="0" y="28" class="t-main" style="font-family: ui-sans-serif, system-ui, sans-serif; font-weight: 900; font-size: 20px; letter-spacing: -1px;">
    SYSTEMS<tspan class="t-accent">_</tspan>PLAYGROUND<tspan class="t-accent">.</tspan>
  </text>

  <g transform="translate(233, 16)">
    <path d="M2 2 L8 7 L2 12" class="s-accent" stroke-width="2.5" stroke-linecap="square" fill="none" />
    
    <text x="14" y="10" class="t-accent" style="font-family: ui-monospace, monospace; font-weight: 900; font-size: 13px;">YZ</text>
    
    <rect x="14" y="12" width="16" height="2" class="t-accent" />
  </g>
</svg>
