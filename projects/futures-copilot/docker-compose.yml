
services:
  futures-copilot-redis:
    image: redis:7-alpine
    ports:
      - "6385:6379"
    volumes:
      - copilot_redis_data:/data

  futures-copilot-postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: futures_copilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - copilot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d futures_copilot"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 2s

  futures-copilot-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      PORT: 8088
      REDIS_ADDR: futures-copilot-redis:6379
      POSTGRES_URL: postgres://postgres:postgres@futures-copilot-postgres:5432/futures_copilot?sslmode=disable
    depends_on:
      futures-copilot-redis:
        condition: service_started
      futures-copilot-postgres:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8088:8088"

  futures-copilot-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./frontend/.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8088/api
      PORT: 8087
    depends_on:
      - futures-copilot-backend
    ports:
      - "8087:8087"

volumes:
  copilot_redis_data:
  copilot_pg_data:
