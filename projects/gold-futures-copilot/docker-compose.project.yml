services:
  gold-copilot-postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: gold_copilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gold_copilot"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 2s

  gold-copilot-redis:
    image: redis:7-alpine
    ports:
      - "6385:6379"

  gold-copilot-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: :8091
      POSTGRES_URL: postgres://postgres:postgres@gold-copilot-postgres:5432/gold_copilot?sslmode=disable
      REDIS_ADDR: gold-copilot-redis:6379
      REDIS_DB: "0"
      REDPANDA_BROKERS: host.docker.internal:19092
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      gold-copilot-postgres:
        condition: service_healthy
      gold-copilot-redis:
        condition: service_started
    restart: on-failure
    ports:
      - "8091:8091"

  gold-copilot-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      GOLD_COPILOT_BACKEND_URL: http://gold-copilot-backend:8091
      GOLD_COPILOT_FRONTEND_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      - gold-copilot-backend
    ports:
      - "3000:3000"

  # Redpanda is expected from platform-level compose stack; keep project isolated to required deps here.
