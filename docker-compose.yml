# Base Docker Compose Configuration
# This file contains the shared infrastructure definitions.
# Do NOT run this alone; it is meant to be merged with either:
# - docker-compose.override.yml (auto-loaded for local dev)
# - docker-compose.prod.yml (for production/Watchtower)

services:
  backend:
    ports:
      - "8085:8080"
    environment:
      - REDIS_URL=redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    env_file:
      - ./backend/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - rabbitmq

  frontend:
    ports:
      - "8086:3000"
    environment:
      # Local Node server proxies to Go Backend on the internal Docker network
      - INTERNAL_BACKEND_URL=http://backend:8080
    depends_on:
      - backend

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    labels:
      - "playground.widget=queue"
      - "playground.name=Asynchronous Webhook Processing"
      - "playground.desc=Use Cases: High-throughput webhook ingestion from external platforms (such as ATS or payment gateways) often causes API timeouts and database lock contention when processed synchronously. Solution: Demonstrates Event-Driven Architecture (EDA) by decoupling the API from the database. Payloads are instantly acknowledged and placed into a RabbitMQ message queue, allowing background workers to process them at a safe, controlled rate."

volumes:
  redis_data:
  rabbitmq_data:
