# Base Docker Compose Configuration
# This file contains the shared infrastructure definitions.
# Do NOT run this alone; it is meant to be merged with either:
# - docker-compose.override.yml (auto-loaded for local dev)
# - docker-compose.prod.yml (for production/Watchtower)

services:
  backend:
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - rabbitmq

  frontend:
    ports:
      - "8081:3000"
    depends_on:
      - backend

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    labels:
      - "playground.widget=cache"
      - "playground.name=Redis Cache"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    labels:
      - "playground.widget=queue"
      - "playground.name=RabbitMQ Message Queue"

volumes:
  redis_data:
  rabbitmq_data:
