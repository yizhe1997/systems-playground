# Production Override
# Use this when running via Watchtower or pulling pre-built images.
# Run with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    image: ${REGISTRY_HOST}/systems-playground-backend:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      # Picked up automatically by self-host/infra/scripts/cloudflared-sync.sh - already live at
      # this hostname via a manually-added config.yml entry; migrating it to a label here means
      # the automated sync now owns it going forward instead. Host port (8085) comes from the base
      # docker-compose.yml, unchanged by this override.
      - cloudflare.tunnel.hostname=portfolio-api.38569123.xyz
      - cloudflare.tunnel.port=8085

  frontend:
    image: ${REGISTRY_HOST}/systems-playground-frontend:latest
    environment:
      # These read directly from the invoking process's environment (which `infisical run`
      # populates) via compose interpolation — no frontend/.env file needed or written anymore.
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      # See the backend service's comment above - same migration, host port (8086) from the base
      # docker-compose.yml.
      - cloudflare.tunnel.hostname=portfolio.38569123.xyz
      - cloudflare.tunnel.port=8086
