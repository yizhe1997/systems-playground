services:
  registry:
    image: registry:2
    container_name: registry
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - REGISTRY_AUTH=htpasswd
      - REGISTRY_AUTH_HTPASSWD_REALM=Registry Realm
      - REGISTRY_AUTH_HTPASSWD_PATH=/auth/htpasswd
    volumes:
      # Image blobs go in a named volume, matching every other stateful service in this repo
      # (n8n's postgres, uptime-kuma, infisical's postgres/redis) — never a host bind-mount for
      # data that matters, see the Filebrowser SQLite/WSL2 incident for why.
      - registry_data:/var/lib/registry
      # The htpasswd file itself is just a static credentials file regenerated fresh on every
      # deploy (see deploy-infra-registry.yml) — no locking concerns, a plain bind mount is fine.
      - ./auth:/auth
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  registry_data:
    driver: local
