services:
  db:
    image: postgres:14
    environment:
      - POSTGRES_USER=${N8N_POSTGRES_USER:-n8n}
      - POSTGRES_PASSWORD=${N8N_POSTGRES_PASSWORD}
      - POSTGRES_DB=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  n8n:
    image: ${REGISTRY_HOST}/systems-playground-n8n:latest
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${N8N_POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${N8N_POSTGRES_PASSWORD}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=${N8N_HOST}
      - WEBHOOK_TUNNEL_URL=https://${N8N_HOST}
      - WEBHOOK_URL=https://${N8N_HOST}
      - N8N_PROTOCOL=https
      - NODE_FUNCTION_ALLOW_EXTERNAL=youtube-transcript
      - EXECUTIONS_PROCESS=main
      - N8N_TRUST_PROXY=true
    depends_on:
      - db
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      # Picked up automatically by self-host/infra/scripts/cloudflared-sync.sh - already live at
      # this hostname via a manually-added config.yml entry; migrating it to a label here means
      # the automated sync now owns it going forward instead.
      - cloudflare.tunnel.hostname=n8n.38569123.xyz
      - cloudflare.tunnel.port=5678

volumes:
  postgres_data:
    external: true
    name: n8n_postgres_data
  n8n_data:
    external: true
    name: n8n_n8n_data
