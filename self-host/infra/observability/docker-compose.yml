services:
  loki:
    image: grafana/loki:3.1.1
    container_name: observability-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # Ships every container's Docker logs to Loki via Docker service discovery - no per-service
  # config needed, new containers on this host are picked up automatically.
  promtail:
    image: grafana/promtail:3.1.1
    container_name: observability-promtail
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: observability-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # Per-container resource metrics (CPU/memory/network/disk) for every container on the host.
  # Host port 8082, not cAdvisor's own default 8080 - this host's Cloudflare Tunnel config already
  # routes yzportalserver.38569123.xyz to localhost:8080 for an unrelated project (currently not
  # running, but the route is still configured - would collide the moment that project comes back).
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: observability-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    ports:
      - "8082:8080"
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # Host-level metrics (CPU/memory/disk/network of the host itself, not just containers).
  # `pid: host` is a standard, documented requirement for this exporter to read accurate host
  # process/network state - not a custom elevated-privilege choice for this repo specifically.
  # Plain read-only mount, not node-exporter's commonly-documented `:ro,rslave` propagation mode -
  # confirmed by hand that `rslave` fails outright under Docker Desktop for Windows ("path / is
  # mounted on / but it is not a shared or slave mount"). Trade-off: node-exporter won't pick up
  # filesystems mounted on the host AFTER this container starts without a restart - acceptable for
  # a homelab that doesn't add new mounts often, and safer than shipping a config confirmed broken
  # in at least one real environment.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: observability-node-exporter
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro
    pid: host
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # Host port 3030, not Grafana's own default 3000 - that's also the single most common Next.js/
  # React dev-server default, so it would collide the moment anyone runs `npm run dev` for the
  # portfolio frontend locally on this host while this stack is up.
  grafana:
    image: grafana/grafana:11.2.0
    container_name: observability-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3030:3000"
    depends_on:
      - loki
      - prometheus
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
      # Picked up automatically by self-host/infra/scripts/cloudflared-sync.sh - adds/updates the
      # ingress entry in config.yml and the matching Cloudflare DNS record with no manual step.
      - cloudflare.tunnel.hostname=grafana.38569123.xyz
      - cloudflare.tunnel.port=3030

volumes:
  loki_data:
  prometheus_data:
  grafana_data:
