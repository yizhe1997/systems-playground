services:
  backend:
    container_name: infisical-backend
    # Pinned 2026-07-13, matches what was actually already running (confirmed via digest lookup
    # against Docker Hub's tag list, not just picking the newest available tag) — same reasoning
    # as SHA-pinning Actions: a compromised or broken upstream :latest push shouldn't silently
    # roll onto the root-of-trust service. To upgrade deliberately later: check
    # https://github.com/Infisical/infisical/releases, confirm the target version actually exists
    # as a Docker Hub tag first (the combined self-hosted image's tags can trail the GitHub release
    # version), then bump this and redeploy.
    image: infisical/infisical:v0.162.3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    environment:
      - NODE_ENV=production
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/status"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 5
    networks:
      - infisical

  redis:
    container_name: infisical-redis
    image: redis:7-alpine
    restart: unless-stopped
    env_file: .env
    networks:
      - infisical
    volumes:
      - redis_data:/data

  db:
    container_name: infisical-db
    image: postgres:14-alpine
    restart: unless-stopped
    env_file: .env
    networks:
      - infisical
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      # -d postgres explicitly: without it, psql defaults to a database named after the
      # connecting user, which can race Postgres's own database-creation step on first boot.
      test: "pg_isready --username=${POSTGRES_USER} && psql --username=${POSTGRES_USER} --dbname=postgres --list"
      interval: 5s
      timeout: 10s
      start_period: 15s
      retries: 10

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local

networks:
  infisical:
    driver: bridge
