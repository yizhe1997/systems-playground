services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    ports:
      - "8088:80"
    volumes:
      # /srv stays a host bind mount deliberately — these are the actual files being browsed/
      # edited, meant to be visible on the host filesystem too.
      - ./data/files:/srv
      # /database and /config are Docker-managed named volumes, not host bind mounts. Filebrowser's
      # SQLite database needs real flock/mmap support, which Docker Desktop's WSL2 bind-mount
      # passthrough (/mnt/wsl/docker-desktop-bind-mounts/...) doesn't reliably provide — that's what
      # caused the "Error: timeout" restart loop. Named volumes live inside Docker's own storage and
      # sidestep that passthrough layer entirely, matching every other stateful service in this repo
      # (n8n's postgres, uptime-kuma, infisical's postgres/redis all already use named volumes).
      - db_data:/database
      - config_data:/config
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      # Picked up automatically by self-host/infra/scripts/cloudflared-sync.sh - already live at
      # this hostname via a manually-added config.yml entry; migrating it to a label here means
      # the automated sync now owns it going forward instead.
      - cloudflare.tunnel.hostname=files.38569123.xyz
      - cloudflare.tunnel.port=8088

volumes:
  db_data:
  config_data:
