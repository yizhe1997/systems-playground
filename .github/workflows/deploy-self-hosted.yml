name: Instant Deploy (Self-Hosted)
on:
  push:
    branches:
      - main
    paths:
      - 'docker-compose*.yml'
  workflow_run:
    workflows: ["Build and Push Backend", "Build and Push Frontend"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      # Set this in GitHub -> Settings -> Secrets and variables -> Actions
      APP_DIR: ${{ vars.APP_DIR || '/home/user/apps/systems-playground' }}
      # Export the Docker Hub username so docker compose can dynamically construct the image pull path
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Trigger Instant Zero-Downtime Deployment
        run: |
          # 1. Ensure the destination directory exists
          mkdir -p "$APP_DIR"
          
          # 2. Copy ONLY the necessary compose files from the cloned runner workspace to the APP_DIR
          echo "📦 Copying latest compose configurations to $APP_DIR..."
          cp docker-compose.yml "$APP_DIR/"
          cp docker-compose.prod.yml "$APP_DIR/"
          
          # 3. Navigate to the APP_DIR to execute Docker commands
          cd "$APP_DIR" || { echo "❌ Directory $APP_DIR not found!"; exit 1; }
          
          echo "📥 Pulling latest pre-built images from registry..."
          docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
          
          echo "🔄 Gracefully recreating containers..."
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
          
          echo "🧹 Cleaning up old images..."
          docker image prune -f
          
          echo "✅ Instant deployment complete!"