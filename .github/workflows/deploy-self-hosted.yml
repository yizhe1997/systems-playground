name: Instant Deploy (Self-Hosted)
on:
  push:
    branches:
      - main
    paths:
      - 'docker-compose*.yml'
  workflow_run:
    workflows: ["Build and Push Backend", "Build and Push Frontend"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      APP_DIR: ${{ vars.APP_DIR || '/home/user/apps/systems-playground' }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      RESUME_EMAIL_API_KEY: ${{ secrets.RESUME_EMAIL_API_KEY }}
      RESUME_WEBHOOK_URL: ${{ secrets.RESUME_WEBHOOK_URL }}
      
      # Frontend Secrets
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
      ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
      
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Trigger Instant Zero-Downtime Deployment
        run: |
          mkdir -p "$APP_DIR"
          
          echo "📦 Copying latest compose configurations to $APP_DIR..."
          cp docker-compose.yml "$APP_DIR/"
          cp docker-compose.prod.yml "$APP_DIR/docker-compose.override.yml"
          
          echo "🔐 Constructing .env files from GitHub Secrets..."
          
          # Root .env for docker-compose.yml overrides
          cat <<EOF > "$APP_DIR/.env"
          DOCKER_USERNAME=$DOCKER_USERNAME
          RESUME_EMAIL_API_KEY=$RESUME_EMAIL_API_KEY
          RESUME_WEBHOOK_URL=$RESUME_WEBHOOK_URL
          EOF
          
          # Frontend .env
          mkdir -p "$APP_DIR/frontend"
          cat <<EOF > "$APP_DIR/frontend/.env"
          NEXTAUTH_SECRET=$NEXTAUTH_SECRET
          NEXTAUTH_URL=$NEXTAUTH_URL
          GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
          GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
          ADMIN_EMAILS=$ADMIN_EMAILS
          ADMIN_API_KEY=$ADMIN_API_KEY
          EOF
          
          cd "$APP_DIR" || { echo "❌ Directory $APP_DIR not found!"; exit 1; }
          
          echo "📥 Pulling latest pre-built images from registry..."
          docker compose pull
          
          echo "🔄 Gracefully recreating containers..."
          docker compose up -d
          
          echo "🧹 Cleaning up old images..."
          docker image prune -f
          
          echo "✅ Instant deployment complete!"