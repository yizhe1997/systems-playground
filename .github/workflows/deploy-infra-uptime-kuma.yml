name: Deploy Infra - Uptime Kuma
on:
  push:
    branches:
      - main
    paths:
      - 'self-host/infra/uptime-kuma/**'
      - '.github/workflows/deploy-infra-uptime-kuma.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      # No fallback defaults — every one of these must be set explicitly as a repository
      # Variable/Secret, or the job fails fast instead of silently using an assumed value.
      INFRA_BASE_DIR: ${{ vars.INFRA_BASE_DIR }}
      UPTIME_KUMA_CLOUDFLARED_TOKEN: ${{ secrets.UPTIME_KUMA_CLOUDFLARED_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Deploy uptime-kuma
        run: |
          : "${INFRA_BASE_DIR:?INFRA_BASE_DIR repository variable must be set}"
          : "${UPTIME_KUMA_CLOUDFLARED_TOKEN:?UPTIME_KUMA_CLOUDFLARED_TOKEN repository secret must be set}"
          TARGET="$INFRA_BASE_DIR/uptime-kuma"
          mkdir -p "$TARGET"

          echo "📦 Syncing uptime-kuma compose..."
          cp self-host/infra/uptime-kuma/docker-compose.yml "$TARGET/"

          echo "🔐 Writing uptime-kuma .env..."
          cat <<EOF > "$TARGET/.env"
          UPTIME_KUMA_CLOUDFLARED_TOKEN=$UPTIME_KUMA_CLOUDFLARED_TOKEN
          EOF

          echo "🔄 Restarting uptime-kuma..."
          cd "$TARGET"
          docker compose pull
          docker compose up -d
          echo "✅ uptime-kuma deployed."

      - name: Prune old images
        run: docker image prune -f
