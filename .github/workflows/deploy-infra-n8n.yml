name: Deploy Infra - n8n
on:
  push:
    branches:
      - main
    paths:
      - 'self-host/infra/n8n/**'
      - '.github/workflows/deploy-infra-n8n.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      # No fallback defaults — every one of these must be set explicitly as a repository
      # Variable/Secret, or the job fails fast instead of silently using an assumed value.
      INFRA_BASE_DIR: ${{ vars.INFRA_BASE_DIR }}
      N8N_POSTGRES_USER: ${{ vars.N8N_POSTGRES_USER }}
      N8N_POSTGRES_PASSWORD: ${{ secrets.N8N_POSTGRES_PASSWORD }}
      N8N_BASIC_AUTH_USER: ${{ vars.N8N_BASIC_AUTH_USER }}
      N8N_BASIC_AUTH_PASSWORD: ${{ secrets.N8N_BASIC_AUTH_PASSWORD }}
      N8N_HOST: ${{ vars.N8N_HOST }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Deploy n8n
        run: |
          : "${INFRA_BASE_DIR:?INFRA_BASE_DIR repository variable must be set}"
          : "${N8N_POSTGRES_USER:?N8N_POSTGRES_USER repository variable must be set}"
          : "${N8N_POSTGRES_PASSWORD:?N8N_POSTGRES_PASSWORD repository secret must be set}"
          : "${N8N_BASIC_AUTH_USER:?N8N_BASIC_AUTH_USER repository variable must be set}"
          : "${N8N_BASIC_AUTH_PASSWORD:?N8N_BASIC_AUTH_PASSWORD repository secret must be set}"
          : "${N8N_HOST:?N8N_HOST repository variable must be set}"
          TARGET="$INFRA_BASE_DIR/n8n"
          mkdir -p "$TARGET"

          echo "📦 Syncing n8n compose and Dockerfile..."
          cp self-host/infra/n8n/docker-compose.yml "$TARGET/"
          cp self-host/infra/n8n/Dockerfile "$TARGET/"

          echo "🔐 Writing n8n .env..."
          cat <<EOF > "$TARGET/.env"
          N8N_POSTGRES_USER=$N8N_POSTGRES_USER
          N8N_POSTGRES_PASSWORD=$N8N_POSTGRES_PASSWORD
          N8N_BASIC_AUTH_USER=$N8N_BASIC_AUTH_USER
          N8N_BASIC_AUTH_PASSWORD=$N8N_BASIC_AUTH_PASSWORD
          N8N_HOST=$N8N_HOST
          EOF

          echo "🔄 Rebuilding and restarting n8n..."
          cd "$TARGET"
          docker compose up --build -d
          echo "✅ n8n deployed."

      - name: Prune old images
        run: docker image prune -f
