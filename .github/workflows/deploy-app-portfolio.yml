name: Deploy App - Portfolio
on:
  push:
    branches:
      - main
    paths:
      - 'self-host/apps/portfolio/**'
      - '.github/workflows/deploy-app-portfolio.yml'
  workflow_run:
    workflows: ["Build and Push Backend", "Build and Push Frontend"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      # No fallback defaults anywhere in this job, intentionally — every one of these must
      # set explicitly as a repository Variable/Secret, or the job fails fast with a clear error
      # instead of silently deploying to an unintended path.
      INFRA_BASE_DIR: ${{ vars.INFRA_BASE_DIR }}
      INFISICAL_CLIENT_ID: ${{ vars.INFISICAL_CLIENT_ID }}
      INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
      INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID }}
      INFISICAL_DOMAIN: ${{ vars.INFISICAL_SITE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Install Infisical CLI
        run: curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash && sudo apt-get install -y infisical

      - name: Authenticate to Infisical
        id: infisical-auth
        run: |
          : "${INFISICAL_DOMAIN:?INFISICAL_SITE_URL repository variable must be set}"
          : "${INFISICAL_CLIENT_ID:?INFISICAL_CLIENT_ID repository variable must be set}"
          : "${INFISICAL_CLIENT_SECRET:?INFISICAL_CLIENT_SECRET repository secret must be set}"
          : "${INFISICAL_PROJECT_ID:?INFISICAL_PROJECT_ID repository variable must be set}"
          TOKEN=$(infisical login --domain="$INFISICAL_DOMAIN" --method=universal-auth \
            --client-id="$INFISICAL_CLIENT_ID" --client-secret="$INFISICAL_CLIENT_SECRET" \
            --plain --silent)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Trigger Instant Zero-Downtime Deployment
        env:
          INFISICAL_TOKEN: ${{ steps.infisical-auth.outputs.token }}
        run: |
          # infisical run injects every secret in this project/env as a real environment
          # variable into the wrapped script below — nothing above this point ever held the
          # actual secret values, only the Infisical credential used to fetch them.
          infisical run --domain="$INFISICAL_DOMAIN" --token="$INFISICAL_TOKEN" \
            --projectId="$INFISICAL_PROJECT_ID" --env=prod -- bash -c '
          : "${INFRA_BASE_DIR:?INFRA_BASE_DIR repository variable must be set}"
          APP_DIR="$INFRA_BASE_DIR/systems-playground"
          mkdir -p "$APP_DIR"
          
          echo "📦 Copying latest compose configurations to $APP_DIR..."
          cp self-host/apps/portfolio/docker-compose.yml "$APP_DIR/"
          cp self-host/apps/portfolio/docker-compose.prod.yml "$APP_DIR/docker-compose.override.yml"
          
          echo "🔐 Constructing .env files from Infisical-injected environment..."
          
          # Root .env for docker-compose.yml overrides (only needed for docker-compose itself, e.g. DOCKER_USERNAME)
          cat <<EOF > "$APP_DIR/.env"
          DOCKER_USERNAME=$DOCKER_USERNAME
          EOF
          
          # Frontend .env
          mkdir -p "$APP_DIR/frontend"
          cat <<EOF > "$APP_DIR/frontend/.env"
          NEXTAUTH_SECRET=$NEXTAUTH_SECRET
          NEXTAUTH_URL=$NEXTAUTH_URL
          GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
          GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
          ADMIN_EMAILS=$ADMIN_EMAILS
          ADMIN_API_KEY=$ADMIN_API_KEY
          EOF

          # Backend .env
          mkdir -p "$APP_DIR/backend"
          cat <<EOF > "$APP_DIR/backend/.env"
          ADMIN_API_KEY=$ADMIN_API_KEY
          SMTP_EMAIL=$SMTP_EMAIL
          SMTP_PASSWORD=$SMTP_PASSWORD
          RESUME_WEBHOOK_URL=$RESUME_WEBHOOK_URL
          FILEBROWSER_PUBLIC_URL=$FILEBROWSER_PUBLIC_URL
          FILEBROWSER_ADMIN_USERNAME=$FILEBROWSER_ADMIN_USERNAME
          FILEBROWSER_ADMIN_PASSWORD=$FILEBROWSER_ADMIN_PASSWORD
          EOF
          
          cd "$APP_DIR" || { echo "❌ Directory $APP_DIR not found!"; exit 1; }
          
          echo "📥 Pulling latest pre-built images from registry..."
          docker compose pull
          
          echo "🔄 Gracefully recreating containers..."
          docker compose up -d
          
          echo "🧹 Cleaning up old images..."
          docker image prune -f

          echo "✅ Instant deployment complete!"
          '