name: Deploy App - Portfolio
on:
  push:
    branches:
      - main
    paths:
      - 'self-host/apps/portfolio/**'
      - '.github/workflows/deploy-app-portfolio.yml'
  workflow_run:
    workflows: ["Build and Push Backend", "Build and Push Frontend"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      APP_BASE_DIR: ${{ vars.APP_BASE_DIR }}
      INFISICAL_CLIENT_ID: ${{ vars.INFISICAL_CLIENT_ID }}
      INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
      INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID }}
      INFISICAL_DOMAIN: ${{ vars.INFISICAL_SITE_URL || 'http://localhost:8090' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Install Infisical CLI
        # No sudo/apt: self-hosted runner's service account very likely doesn't have passwordless
        # sudo configured, which fails immediately in a non-interactive CI context (no TTY to
        # prompt). Downloading the release binary straight to a user-writable dir sidesteps that
        # entirely instead of requiring a sudoers change on the host.
        run: |
          LATEST_TAG=$(curl -sL -o /dev/null -w '%{url_effective}' https://github.com/Infisical/cli/releases/latest | sed 's#.*/tag/##')
          VERSION="${LATEST_TAG#v}"
          curl -sL "https://github.com/Infisical/cli/releases/download/${LATEST_TAG}/cli_${VERSION}_linux_amd64.tar.gz" -o infisical-cli.tar.gz
          mkdir -p "$HOME/.local/bin"
          tar -xzf infisical-cli.tar.gz -C "$HOME/.local/bin" infisical
          chmod +x "$HOME/.local/bin/infisical"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          rm infisical-cli.tar.gz

      - name: Authenticate to Infisical
        id: infisical-auth
        run: |
          : "${INFISICAL_CLIENT_ID:?INFISICAL_CLIENT_ID repository variable must be set}"
          : "${INFISICAL_CLIENT_SECRET:?INFISICAL_CLIENT_SECRET repository secret must be set}"
          : "${INFISICAL_PROJECT_ID:?INFISICAL_PROJECT_ID repository variable must be set}"
          TOKEN=$(infisical login --domain="$INFISICAL_DOMAIN" --method=universal-auth \
            --client-id="$INFISICAL_CLIENT_ID" --client-secret="$INFISICAL_CLIENT_SECRET" \
            --plain --silent)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Trigger Instant Zero-Downtime Deployment
        env:
          INFISICAL_TOKEN: ${{ steps.infisical-auth.outputs.token }}
        run: |
          # infisical run injects every secret in this project/env as a real environment
          # variable into the wrapped script below — nothing above this point ever held the
          # actual secret values, only the Infisical credential used to fetch them.
          infisical run --domain="$INFISICAL_DOMAIN" --token="$INFISICAL_TOKEN" \
            --projectId="$INFISICAL_PROJECT_ID" --env=prod -- bash -c '
          : "${APP_BASE_DIR:?APP_BASE_DIR repository variable must be set}"
          APP_DIR="$APP_BASE_DIR/portfolio"
          mkdir -p "$APP_DIR"

          echo "📦 Copying latest compose configurations to $APP_DIR..."
          cp self-host/apps/portfolio/docker-compose.yml "$APP_DIR/"
          cp self-host/apps/portfolio/docker-compose.prod.yml "$APP_DIR/docker-compose.override.yml"

          # No .env files written anymore. docker-compose.yml/docker-compose.prod.yml use
          # ${VAR} interpolation (environment: blocks) instead of env_file:, so `docker compose`
          # below reads every secret directly from this script's own process environment — the
          # same one infisical run injected into. See docs/adrs/002-infisical-secret-injection.md.

          cd "$APP_DIR" || { echo "❌ Directory $APP_DIR not found!"; exit 1; }
          
          echo "📥 Pulling latest pre-built images from registry..."
          docker compose pull
          
          echo "🔄 Gracefully recreating containers..."
          docker compose up -d
          
          echo "🧹 Cleaning up old images..."
          docker image prune -f

          echo "✅ Instant deployment complete!"
          '