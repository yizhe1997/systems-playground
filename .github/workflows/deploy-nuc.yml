name: Deploy to NUC (Self-Hosted)

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      # Set this in GitHub -> Settings -> Secrets and variables -> Actions
      # If not set, it defaults to the generic path.
      APP_DIR: ${{ vars.APP_DIR || '/home/user/apps/systems-playground' }}
      
    steps:
      - name: Trigger Zero-Downtime Deployment
        run: |
          bash "$APP_DIR/infra/scripts/deploy-playground.sh"