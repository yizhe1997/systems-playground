name: Deploy Infra - Filebrowser
on:
  push:
    branches:
      - main
    paths:
      - 'self-host/infra/filebrowser/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      INFRA_BASE_DIR: ${{ vars.INFRA_BASE_DIR || '/home/yizhe/infra' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Deploy filebrowser
        run: |
          TARGET="$INFRA_BASE_DIR/filebrowser"
          mkdir -p "$TARGET"

          echo "📦 Syncing filebrowser compose..."
          cp self-host/infra/filebrowser/docker-compose.yml "$TARGET/"

          echo "🔄 Restarting filebrowser..."
          cd "$TARGET"
          docker compose pull
          docker compose up -d
          echo "✅ filebrowser deployed."

      - name: Prune old images
        run: docker image prune -f
