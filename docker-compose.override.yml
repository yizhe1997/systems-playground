# Local Development Override
# Docker Compose automatically loads this file if you just run \`docker compose up\`!
# It injects the build instructions and local environment variables.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8085
    env_file:
      - ./frontend/.env
